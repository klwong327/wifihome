<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Wi-Fi</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            color: #1c1e21;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 350px;
        }
        h1 { margin-bottom: 0.5rem; font-size: 1.5rem; }
        p { color: #606770; margin-bottom: 2rem; }
        .info-box {
            background: #f7f8fa;
            border: 1px solid #dddfe2;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .info-box:active { background: #e4e6eb; }
        .label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #8a8d91;
            margin-bottom: 0.25rem;
        }
        .value {
            font-family: monospace;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .copy-hint { font-size: 0.7rem; color: #1877f2; margin-top: 0.5rem; }
    </style>
</head>
<body>

<div class="card">
    <h1>Welcome to my home!</h1>
    <p>Tap a field below to copy the details to your clipboard.</p>

    <div class="info-box" onclick="copyText('Your_Password_Here')">
        <span class="label">Password</span>
        <span class="value">We1c0meT0myHom3</span>
    </div>
    
    <div class="copy-hint">Tap to copy</div>
</div>

<script>
    function copyText(text) {
        navigator.clipboard.writeText(text).then(() => {
            alert("Copied: " + text);
        });
    }
</script>

</body>
</html>
